        function App() {
            const [view, setView] = useState('home');
            const [userName, setUserName] = useState('');
            const [isAboutOpen, setIsAboutOpen] = useState(false);
            const [basicPay, setBasicPay] = useState(7000);
            const [joinDate, setJoinDate] = useState('2008-04-01');
            const [isRetiredBetween, setIsRetiredBetween] = useState('');
            const [retirementDate, setRetirementDate] = useState('');
            const [increments, setIncrements] = useState({});
            const [firstSalaryMonth, setFirstSalaryMonth] = useState('');
            const [breakdownData, setBreakdownData] = useState([]);
            const [isCalculated, setIsCalculated] = useState(false);
            const [customIncrements, setCustomIncrements] = useState([]);
            const [newIncDate, setNewIncDate] = useState('');
            const [newIncType, setNewIncType] = useState('single_increment');

            const addCustomIncrement = () => {
                if (!newIncDate || !newIncType) return;
                setCustomIncrements(prev => [
                    ...prev, 
                    { id: Date.now().toString(), date: newIncDate, type: newIncType }
                ]);
                setNewIncDate('');
                setNewIncType('single_increment');
                setIsCalculated(false);
            };

            const removeCustomIncrement = (id) => {
                setCustomIncrements(prev => prev.filter(inc => inc.id !== id));
                setIsCalculated(false);
            };

            const generateTimeline = () => {
                if (!joinDate) return [];
                const join = new Date(joinDate);
                const refDate = new Date('2008-04-01');
                
                let startYear = 2008;
                if (join > refDate) {
                    startYear = join.getFullYear();
                }

                let endYear = 2019;
                let endMonth = 12;

                if (join <= refDate && isRetiredBetween === 'yes') {
                    if (!retirementDate) return [];
                    const retDate = new Date(retirementDate);
                    endYear = retDate.getFullYear();
                    endMonth = retDate.getMonth() + 1;
                }

                const dates = new Set();
                let initialDateStr = '2008-04-01';
                if (join > refDate) {
                    let m = join.getMonth() + 1;
                    let y = join.getFullYear();
                    if (firstSalaryMonth) {
                        const selectedMonth = parseInt(firstSalaryMonth, 10);
                        if (selectedMonth < m) y += 1;
                        m = selectedMonth;
                    }
                    initialDateStr = `${y}-${m.toString().padStart(2, '0')}-01`;
                }
                dates.add(initialDateStr);
                
                for (let y = startYear; y <= endYear; y++) {
                    const julyDate = new Date(y, 6, 1);
                    const startDate = new Date(initialDateStr);
                    if (julyDate > startDate && (y < endYear || (y === endYear && endMonth >= 7))) {
                        dates.add(`${y}-07-01`);
                    }
                }

                customIncrements.forEach(inc => {
                    const d = new Date(inc.date);
                    const start = new Date(initialDateStr);
                    const end = new Date(endYear, endMonth - 1, 31);
                    if (d >= start && d <= end) dates.add(inc.date);
                });

                return Array.from(dates).sort();
            };

            const paySeries = useMemo(() => {
                const timeline = generateTimeline();
                if (timeline.length === 0) return {};

                const series = {};
                let currentPay = Number(basicPay) || 0;
                const initialDate = timeline[0];
                series[initialDate] = currentPay;

                for (let i = 1; i < timeline.length; i++) {
                    const date = timeline[i];
                    const customInc = customIncrements.find(inc => inc.date === date);
                    let increase = 0;
                    
                    if (customInc) {
                        if (customInc.type === 'single_increment') {
                            increase = Math.ceil(Math.floor(currentPay * 0.03) / 10) * 10;
                        } else if (customInc.type === 'double_increment') {
                            increase = Math.ceil(Math.floor(currentPay * 0.06) / 10) * 10;
                        }
                    } else if (date.endsWith('-07-01')) {
                        const controllingDate = timeline[i - 1];
                        const incrementType = increments[controllingDate];
                        if (incrementType === 'single_increment') {
                            increase = Math.ceil(Math.floor(currentPay * 0.03) / 10) * 10;
                        } else if (incrementType === 'double_increment') {
                            increase = Math.ceil(Math.floor(currentPay * 0.06) / 10) * 10;
                        }
                    }
                    currentPay += increase;
                    series[date] = currentPay;
                }
                return series;
            }, [basicPay, increments, customIncrements, joinDate, isRetiredBetween, retirementDate, firstSalaryMonth]);

            const handleCalculate = () => {
                if (!basicPay || isNaN(Number(basicPay))) {
                    alert("Please enter a valid Basic Pay");
                    return;
                }
                const [joinYearStr, joinMonthStr] = joinDate.split('-');
                const joinYear = parseInt(joinYearStr, 10);
                const joinMonth = parseInt(joinMonthStr, 10);
                let startYear = joinYear;
                let startMonth = joinMonth;
                if (new Date(joinDate) > new Date('2008-04-01') && firstSalaryMonth) {
                    const selectedMonth = parseInt(firstSalaryMonth, 10);
                    if (selectedMonth < joinMonth) startYear += 1;
                    startMonth = selectedMonth;
                }

                const getPayForMonth = (m, y) => {
                    const currentMs = new Date(y, m - 1, 1).getTime();
                    const timeline = Object.keys(paySeries).sort();
                    let applicablePay = paySeries[timeline[0]] || Number(basicPay);
                    for (const dateStr of timeline) {
                        const [yStr, mStr, dStr] = dateStr.split('-');
                        const changeDate = new Date(Number(yStr), Number(mStr) - 1, Number(dStr));
                        if (changeDate.getTime() <= currentMs) applicablePay = paySeries[dateStr];
                        else break;
                    }
                    return applicablePay;
                };

                const newBreakdown = [];
                for (const data of daData) {
                    if (new Date(joinDate) <= new Date('2008-04-01') && isRetiredBetween === 'yes' && retirementDate) {
                        const retDate = new Date(retirementDate);
                        const dataDate = new Date(data.year, data.month - 1, 1);
                        if (dataDate > retDate) continue;

                                    {isCalculated && (
                                        <div className="mt-8 space-y-6">
                                            <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                                    <div className="space-y-2">
                                                        <h3 className="text-lg font-semibold text-indigo-900">Total Outstanding Arrear</h3>
                                                        <p className="text-indigo-600 text-sm">
                                                            Period: {breakdownData.length > 0 ? `${formatMonthYear(breakdownData[0].month, breakdownData[0].year)} - ${formatMonthYear(breakdownData[breakdownData.length - 1].month, breakdownData[breakdownData.length - 1].year)}` : 'N/A'}
                                                        </p>
                                                        <div className="inline-flex items-center gap-1.5 px-3 py-1 bg-white border border-indigo-200 text-indigo-700 rounded-full text-xs font-bold shadow-sm">
                                                            <Calendar className="w-3.5 h-3.5" />
                                                            Total Duration: {breakdownData.length} Months
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2 text-3xl font-bold text-indigo-700">
                                                        <IndianRupee className="w-8 h-8" />
                                                        {totalArrear.toLocaleString('en-IN')}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                                <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                                    <h3 className="font-semibold text-slate-800 flex items-center gap-2">
                                                        <Info className="w-4 h-4" />
                                                        Month-wise Breakdown (Editable Basic Pay)
                                                    </h3>
                                                    <button
                                                        onClick={downloadPDF}
                                                        className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm"
                                                    >
                                                        <Download className="w-4 h-4" />
                                                        Download PDF
                                                    </button>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left text-sm">
                                                        <thead>
                                                            <tr className="bg-slate-50 text-slate-600">
                                                                <th className="p-4 font-semibold">Month</th>
                                                                <th className="p-4 font-semibold">Basic Pay</th>
                                                                <th className="p-4 font-semibold">State DA (%)</th>
                                                                <th className="p-4 font-semibold">AICPI (%)</th>
                                                                <th className="p-4 font-semibold">Difference (%)</th>
                                                                <th className="p-4 font-semibold text-right">Arrear (Rs.)</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {breakdownData.map((row, index) => (
                                                                <tr key={`${row.year}-${row.month}`} className="hover:bg-slate-50 transition-colors">
                                                                    <td className="p-4 font-medium text-slate-700">
                                                                        {formatMonthYear(row.month, row.year)}
                                                                    </td>
                                                                    <td className="p-4">
                                                                        <input
                                                                            type="number"
                                                                            value={row.basicPay === 0 ? '' : row.basicPay}
                                                                            onChange={(e) => handleBreakdownChange(index, e.target.value)}
                                                                            className="w-32 px-2 py-1 rounded border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                                                                        />
                                                                    </td>
                                                                    <td className="p-4 text-slate-600">{row.state}%</td>
                                                                    <td className="p-4 text-slate-600">{row.aicpi}%</td>
                                                                    <td className="p-4 text-red-600 font-bold">{row.diffPercent}%</td>
                                                                    <td className="p-4 text-right font-semibold text-slate-700">
                                                                        {row.arrearForMonth.toLocaleString('en-IN')}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error("React Render Error:", e);
            document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red; font-family: sans-serif;"><h1>Application Error</h1><p>Please check your internet connection or try a different browser.</p><pre style="white-space: pre-wrap; font-size: 12px;">' + e.message + '</pre></div>';
        }
    </script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>

</body>
</html>
